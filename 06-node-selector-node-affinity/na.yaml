apiVersion: apps/v1
kind: Deployment
metadata:
  name: afinity
spec:
  replicas: 5
  selector:
    matchLabels:
      app: affinity
  template:
    metadata:
      labels:
        app: affinity
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: storage
                operator: In
                values:
                - ssd
                - hdd
              - key: env
                operator: In
                values:
                - prod
      containers:
      - image: nginx
        name: nginx
