apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bind-work-editor
  namespace: dev
subjects:
# You can specify more than one "subject"
- kind: User
  name: jag # "name" is case sensitive
  apiGroup: rbac.authorization.k8s.io
- kind: Group
  name: junior-admins
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role #this must be Role or ClusterRole
  name: work-editor # this must match the name of the Role or ClusterRole you wish to bind to
  apiGroup: rbac.authorization.k8s.io
