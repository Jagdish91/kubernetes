apiVersion: v1
kind: Pod
metadata:
  name: memory-pod
spec:
  containers:
  - image: polinux/stress
    name: memory-pod
    resources:
      requests:
        memory: "100Mi"
      limits:
        memory: "200Mi"
    command: ["stress"]
    args: [ "--vm", "1", "--vm-bytes", "190M", "--vm-hang", "1" ]
